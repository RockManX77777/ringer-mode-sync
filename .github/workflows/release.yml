name: Build and Publish Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleRelease

      - name: Get latest Build Tools version
        id: get-build-tools
        run: |
          LATEST_VERSION=$(ls /usr/local/lib/android/sdk/build-tools | sort -V | tail -n 1)
          echo "Found version: $LATEST_VERSION"
          echo "version=$LATEST_VERSION" >> $GITHUB_OUTPUT

      - name: Sign Mobile APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        env:
          BUILD_TOOLS_VERSION: ${{ steps.get-build-tools.outputs.version }}
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.SIGNING_STORE_PASSWORD }}
          keyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Sign WearOS APK
        uses: r0adkll/sign-android-release@v1
        id: sign_wear
        env:
          BUILD_TOOLS_VERSION: ${{ steps.get-build-tools.outputs.version }}
        with:
          releaseDirectory: wear/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.SIGNING_STORE_PASSWORD }}
          keyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Rename APKs for Release
        run: |
          mv ${{ steps.sign_app.outputs.signedReleaseFile }} ringer-mode-sync-android-${{ github.ref_name }}.apk
          mv ${{ steps.sign_wear.outputs.signedReleaseFile }} ringer-mode-sync-wearos-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ringer-mode-sync-android-*.apk
            ringer-mode-sync-wearos-*.apk